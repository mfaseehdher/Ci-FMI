name: FMU Co-Simulation Validation

env:
  PYTHONIOENCODING: utf-8
  PYTHONUTF8: "1"

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:

  matlab_export:
    name: MATLAB Export (Run Simulink + Export FMU)
    runs-on: self-hosted
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run MATLAB export script
        run: |
          matlab -batch "run_all_exports('experiments')"

      - name: Upload FMUs and reference CSVs
        uses: actions/upload-artifact@v4
        with:
          name: matlab-outputs
          path: |
            experiments/**/*.fmu
            experiments/**/*_ref.csv
            experiments/**/*.json
          retention-days: 1

  python_validate:
    name: Python Validation (Run FMU + Compare + Plot)
    runs-on: self-hosted
    needs: matlab_export
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Clean leftover artifact folders (self-hosted runner)
        run: |
          if exist control rmdir /s /q control
          if exist first_order rmdir /s /q first_order
          if exist second_order rmdir /s /q second_order
          if exist stiff rmdir /s /q stiff
          if exist nonlinear rmdir /s /q nonlinear
          if exist plots rmdir /s /q plots
        shell: cmd

      - name: Download MATLAB outputs
        uses: actions/download-artifact@v4
        with:
          name: matlab-outputs
          path: experiments

      - name: Show structure after download (debug)
        run: |
          echo "=== experiments tree ==="
          dir /s /b experiments\*.fmu
          dir /s /b experiments\*.json
          dir /s /b experiments\*_ref.csv
        shell: cmd

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install fmpy networkx matplotlib dtaidistance

      - name: Run all experiments
        run: |
          python run_all_experiments.py --experiments experiments --tol 0.01 --plots-dir plots

      - name: Upload plots
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: validation-plots
          path: plots/
          retention-days: 30

      - name: Upload result CSVs
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: result-csvs
          path: |
            experiments/**/results_*.csv
            experiments/**/metrics_*.csv
          retention-days: 30
