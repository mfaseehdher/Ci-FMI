name: FMU Co-Simulation Validation

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:

  matlab_export:
    name: MATLAB Export (Run Simulink + Export FMU)
    runs-on: self-hosted
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run MATLAB export script
        run: |
          matlab -batch "run_all_exports('experiments')"

      - name: Upload FMUs and reference CSVs
        uses: actions/upload-artifact@v4
        with:
          name: matlab-outputs
          path: |
            experiments/**/*.fmu
            experiments/**/*_ref.csv
            experiments/**/*.json
          retention-days: 1

  python_validate:
    name: Python Validation (Run FMU + Compare + Plot)
    runs-on: self-hosted
    needs: matlab_export
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download MATLAB outputs
        uses: actions/download-artifact@v4
        with:
          name: matlab-outputs
          path: .

      - name: List downloaded files (debug)
        run: |
          dir experiments\control\motor_speed
        shell: cmd

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install fmpy networkx matplotlib dtaidistance

      - name: Run all experiments
        run: |
          python run_all_experiments.py --experiments experiments --tol 0.01 --plots-dir plots

      - name: Upload plots
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: validation-plots
          path: plots/
          retention-days: 30

      - name: Upload result CSVs
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: result-csvs
          path: |
            experiments/**/results_*.csv
            experiments/**/metrics_*.csv
          retention-days: 30
